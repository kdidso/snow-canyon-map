name: Upload Photos and Build Search Code

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-build-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Write OAuth credentials.json
        run: |
          cat <<'EOF' > credentials.json
          ${{ secrets.GOOGLE_OAUTH_CREDENTIALS_JSON }}
          EOF

      - name: Write OAuth token.json
        run: |
          cat <<'EOF' > token.json
          ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          EOF

      - name: Run upload/build script
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python scripts/upload_photos_and_build_search_code.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/search_bar_code.txt data/downloaded_photos

          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Upload new photos and update search bar code"

          git push
