import re
from pathlib import Path

BASE = Path("data")
DELETE_FILE = BASE / "Names_to_Delete.txt"
PEOPLE_FILE = Path("people.js")


def normalize_name(name: str) -> str:
    """
    Normalize names for comparison:
    - lowercase
    - remove punctuation except spaces
    - collapse repeated whitespace
    """
    name = name.strip().lower()
    name = re.sub(r"[^a-z0-9\s]", "", name)
    name = re.sub(r"\s+", " ", name)
    return name


def load_delete_names(path: Path) -> set[str]:
    if not path.exists():
        print(f"Delete file not found: {path}")
        return set()

    names = set()
    for line in path.read_text(encoding="utf-8").splitlines():
        line = line.strip()
        if line:
            names.add(normalize_name(line))
    return names


def parse_people_entries(content: str):
    """
    Extract each person object from:

    window.people = [
      { name: "...", image: "...", url: "..." },
      ...
    ];

    Returns:
      prefix: text before the array items
      entries: list of full object strings
      suffix: closing text after the array items
    """
    match = re.search(
        r"^(.*?window\.people\s*=\s*\[\s*)(.*?)(\s*\]\s*;\s*)$",
        content,
        flags=re.DOTALL,
    )

    if not match:
        raise ValueError("Could not find a valid window.people = [ ... ]; block in people.js")

    prefix = match.group(1)
    body = match.group(2)
    suffix = match.group(3)

    entries = re.findall(r"\{.*?\}", body, flags=re.DOTALL)

    return prefix, entries, suffix


def extract_name_from_entry(entry: str) -> str | None:
    """
    Pull the name value from an object like:
    { name: "Aaron Stout", image: "...", url: "..." }
    """
    match = re.search(r'name\s*:\s*"([^"]+)"', entry)
    if match:
        return match.group(1).strip()
    return None


def rebuild_people_file(prefix: str, entries: list[str], suffix: str) -> str:
    """
    Rebuild people.js in a clean, safe format.
    """
    if entries:
        body = ",\n  ".join(entries)
        return f"{prefix}  {body}\n{suffix}"
    return f"{prefix}{suffix}"


def main():
    delete_names = load_delete_names(DELETE_FILE)

    if not PEOPLE_FILE.exists():
        print(f"people.js not found: {PEOPLE_FILE}")
        return

    if not delete_names:
        print("No names to delete.")
        return

    content = PEOPLE_FILE.read_text(encoding="utf-8")
    prefix, entries, suffix = parse_people_entries(content)

    kept_entries = []
    removed_names = []

    for entry in entries:
        entry_name = extract_name_from_entry(entry)

        if not entry_name:
            kept_entries.append(entry)
            continue

        normalized_entry_name = normalize_name(entry_name)

        if normalized_entry_name in delete_names:
            removed_names.append(entry_name)
        else:
            kept_entries.append(entry)

    new_content = rebuild_people_file(prefix, kept_entries, suffix)
    PEOPLE_FILE.write_text(new_content, encoding="utf-8")

    print(f"Removed {len(removed_names)} entr{'y' if len(removed_names) == 1 else 'ies'} from people.js")
    for name in removed_names:
        print(f"  - {name}")

    not_found = sorted(
        original for original in delete_names
        if original not in {normalize_name(extract_name_from_entry(e) or "") for e in entries}
    )

    if not_found:
        print("\nNames requested for deletion but not found in people.js:")
        for name in not_found:
            print(f"  - {name}")


if __name__ == "__main__":
    main()
