name: Roster Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-roster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium requests

      - name: Fetch All_Names.txt from LCR
        env:
          LCR_USERNAME: ${{ secrets.LCR_USERNAME }}
          LCR_PASSWORD: ${{ secrets.LCR_PASSWORD }}
          UNIT_NUMBER: ${{ secrets.UNIT_NUMBER }}
        run: python scripts/fetch_lcr_all_names.py

      - name: Extract names from member_locations_JSO.geojson
        run: python scripts/extract_geojson_names.py

      - name: Compare names
        run: python scripts/compare_names.py

      - name: Filter ignored delete names
        run: python scripts/filter_delete_names.py

      - name: Remove deleted names from people.js
        run: python scripts/remove_deleted_people.py

      - name: Commit updated data files back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/All_Names.txt data/Name_Extraction.txt data/New_Names.txt data/Names_to_Delete.txt people.js

          git diff --cached --quiet || git commit -m "Update roster sync outputs"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roster-sync-output
          path: |
            data/All_Names.txt
            data/Name_Extraction.txt
            data/New_Names.txt
            data/Names_to_Delete.txt
            people.js
