function showNavCaption(text) {
  const el = document.getElementById("nav-caption");
  if (!el) return;

  el.textContent = text;
  el.style.display = navigationMode && text ? "block" : "none";
}
    
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');

      wakeLock.addEventListener('release', () => {
        console.log('Wake Lock released');
      });

      console.log('Wake Lock active');
    }
  } catch (err) {
    console.error(`${err.name}, ${err.message}`);
  }
}

async function releaseWakeLock() {
  if (wakeLock !== null) {
    await wakeLock.release();
    wakeLock = null;
  }
}
    
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 3958.8;
      const toRad = x => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function normalizeAddress(str) {
      return String(str || "")
        .toLowerCase()
        .replace(/[.,#]/g, " ")
        .replace(/\bnorth\b/g, "n")
        .replace(/\bsouth\b/g, "s")
        .replace(/\beast\b/g, "e")
        .replace(/\bwest\b/g, "w")
        .replace(/\bstreet\b/g, "st")
        .replace(/\bavenue\b/g, "ave")
        .replace(/\broad\b/g, "rd")
        .replace(/\bdrive\b/g, "dr")
        .replace(/\blane\b/g, "ln")
        .replace(/\bcourt\b/g, "ct")
        .replace(/\bplace\b/g, "pl")
        .replace(/\bterrace\b/g, "ter")
        .replace(/\bcircle\b/g, "cir")
        .replace(/\s+/g, " ")
        .trim();
    }
function getSpecialLocationIcon(type) {
  const iconMap = {
    "Temple": "https://kdidso.github.io/snow-canyon-map/icons/Temples.png",
    "Church": "https://kdidso.github.io/snow-canyon-map/icons/Churches.png",
    "Park": "https://kdidso.github.io/snow-canyon-map/icons/Parks.png",
    "Institute": "https://kdidso.github.io/snow-canyon-map/icons/Institute.png"
  };

  return {
    url: iconMap[type] || iconMap["Church"],
    scaledSize: new google.maps.Size(32, 32),
    anchor: new google.maps.Point(16, 32)
  };
}
    function generateNameRemindURL(firstName, lastName) {
      let originalLast = lastName || "";
      let originalFirst = firstName || "";

      if (originalLast.startsWith("O'") || originalLast.startsWith("O’")) {
        originalLast = "O " + originalLast.slice(2);
      } else {
        originalLast = originalLast.replace(/[\u0027\u2019\u2018\u02BC]/g, "");
      }

      const fullName = `${originalFirst} ${originalLast}`.toLowerCase();
      if (fullName === "kyle idso") {
        return "https://sites.google.com/view/name-remind/home/kyle-idso";
      }

      return "https://sites.google.com/view/name-remind/" +
        `${originalFirst}-${originalLast}`.toLowerCase().replace(/\s+/g, "-");
    }

    function buildGoogleDirectionsUrl(destLat, destLng) {
      return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destLat + "," + destLng)}&travelmode=driving`;
    }
function getFullRoutePath() {
  const route = activeRouteResult?.routes?.[0];
  if (!route) return [];

  const fullPath = [];

  route.legs.forEach(leg => {
    leg.steps.forEach(step => {
      (step.path || []).forEach(p => {
        const pt = getLatLngObj(p);
        if (pt) fullPath.push(pt);
      });
    });
  });

  return fullPath;
}
    

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDuration(durationStr) {
      if (!durationStr) return "";
      const totalSeconds = Number(String(durationStr).replace("s", ""));
      if (!Number.isFinite(totalSeconds)) return durationStr;

      const totalMinutes = Math.round(totalSeconds / 60);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;

      if (hours > 0 && minutes > 0) return `${hours} hr ${minutes} min`;
      if (hours > 0) return `${hours} hr`;
      return `${minutes} min`;
    }

function clearRoute() {
  stopNavigation();
  activeRouteResult = null;
  activeDestination = null;

  if (directionsRenderer) {
    directionsRenderer.setDirections({ routes: [] });
  }

  if (routePolylineFull) routePolylineFull.setMap(null);
  if (routePolylineTraveled) routePolylineTraveled.setMap(null);
  routePolylineFull = null;
  routePolylineTraveled = null;
  fullRoutePathForProgress = [];
  document.getElementById("route-summary").innerHTML = "";
  document.getElementById("route-steps").innerHTML = "";
  document.getElementById("route-panel").style.display = "none";
}

    function openMemberPopup(member) {
      if (!infoWindow) return;

      const p = member.feature.properties;
      const lat = member.lat;
      const lon = member.lng;
      const url = generateNameRemindURL(p.First_Name, p.Last_Name);

      const popupHtml = `
        <div>
          <strong>Last_Name:</strong> ${escapeHtml(p.Last_Name)}<br>
          <strong>First_Name:</strong> ${escapeHtml(p.First_Name)}<br>
          <strong>Address:</strong> ${escapeHtml(p.Address)}<br>
          <strong>Apt_Number:</strong> ${escapeHtml(p.Apt_Number || "")}<br>
          <div class="popup-actions">
            <button onclick="routeTo(${member.id})">Get Directions</button>
            <a href="${url}" target="_blank" rel="noopener noreferrer"><button>Name Remind</button></a>
            <button onclick="showNearby(${member.id})">Nearby</button>
          </div>
        </div>
      `;

      infoWindow.setContent(popupHtml);
      infoWindow.setPosition({ lat: member.lat, lng: member.lng });
      infoWindow.open(map);
    }

async function addCurrentLocationMarker(lat, lng, accuracy = null) {
  const position = { lat, lng };

  if (!currentLocationMarker) {
    currentLocationMarker = new google.maps.Marker({
      position,
      map,
      zIndex: 9999,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 8,
        fillColor: "#1a73e8",
        fillOpacity: 1,
        strokeColor: "#ffffff",
        strokeWeight: 3
      },
      title: "Your location"
    });
  } else {
    currentLocationMarker.setPosition(position);
    currentLocationMarker.setMap(map);
  }

  if (accuracy != null) {
    if (!locationAccuracyCircle) {
      locationAccuracyCircle = new google.maps.Circle({
        map,
        strokeColor: "#1a73e8",
        strokeOpacity: 0.25,
        strokeWeight: 1,
        fillColor: "#1a73e8",
        fillOpacity: 0.15
      });
    }

    locationAccuracyCircle.setCenter(position);
    locationAccuracyCircle.setRadius(accuracy);
    locationAccuracyCircle.setMap(map);
  }
}

function routeTo(memberId) {
  const member = membersById.get(memberId);
  if (!member) return;

  navigator.geolocation.getCurrentPosition(async (pos) => {
    try {
      clearRoute();

      if (!directionsService) {
        directionsService = new google.maps.DirectionsService();
      }

      if (!directionsRenderer) {
directionsRenderer = new google.maps.DirectionsRenderer({
  map,
  panel: document.getElementById("route-steps"),
  suppressMarkers: false,
  suppressPolylines: true,
  preserveViewport: false
});
} else {
  directionsRenderer.setPanel(document.getElementById("route-steps"));
}

      const origin = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      };

      const destination = {
        lat: member.lat,
        lng: member.lng
      };

      await addCurrentLocationMarker(origin.lat, origin.lng, pos.coords.accuracy);

      directionsService.route(
        {
          origin,
          destination,
          travelMode: google.maps.TravelMode.DRIVING
        },
        (result, status) => {
          console.log("Directions status:", status);
          console.log("Directions result:", result);

          if (status !== "OK") {
            alert("Unable to calculate route: " + status);
            return;
          }

          directionsRenderer.setDirections(result);
          activeRouteResult = result;
          activeDestination = destination;
          const path = getFullRoutePath();
          fullRoutePathForProgress = path;
          // remove old lines
          if (routePolylineFull) routePolylineFull.setMap(null);
          if (routePolylineTraveled) routePolylineTraveled.setMap(null);

          // full (remaining) route - BLUE
          routePolylineFull = new google.maps.Polyline({
            path,
            strokeColor: "#1a73e8",
            strokeOpacity: 1,
            strokeWeight: 6,
            map
          });

          // traveled route - GREY
          routePolylineTraveled = new google.maps.Polyline({
            path: [],
            strokeColor: "#888",
            strokeOpacity: 1,
            strokeWeight: 6,
            map
          });

          const leg = result.routes?.[0]?.legs?.[0];
          const distanceText = leg?.distance?.text || "";
          const durationText = leg?.duration?.text || "";

          const routeSummary = document.getElementById("route-summary");
          routeSummary.innerHTML = `
            <div class="route-summary">
              <div><strong>To:</strong> ${escapeHtml(member.feature.properties.First_Name)} ${escapeHtml(member.feature.properties.Last_Name)}</div>
              <div><strong>Address:</strong> ${escapeHtml(member.feature.properties.Address || "")}</div>
              ${distanceText ? `<div><strong>Distance:</strong> ${escapeHtml(distanceText)}</div>` : ""}
              ${durationText ? `<div><strong>Estimated time:</strong> ${escapeHtml(durationText)}</div>` : ""}
              <button onclick="startNavigation()">Start Navigation</button>
              <a class="route-link" target="_blank" rel="noopener noreferrer" href="${buildGoogleDirectionsUrl(member.lat, member.lng)}">Open in full Google Maps</a>
            </div>
          `;
          document.getElementById("route-panel").style.display = "block";
        }
      );
    } catch (err) {
      console.error("ROUTE ERROR:", err);
      alert("Unable to calculate route: " + (err?.message || err));
    }
  }, (err) => {
    console.error("GEOLOCATION ERROR:", err);
    alert("Unable to retrieve location.");
  }, {
    enableHighAccuracy: true,
    timeout: 5000,
    maximumAge: 15000
  });
}

    function showNearby(memberId) {
      const member = membersById.get(memberId);
      if (!member || !infoWindow) return;

      const results = [];

      allMembers.forEach(other => {
        if (other.id !== member.id) {
          const dist = haversine(
            member.lat,
            member.lng,
            other.lat,
            other.lng
          );

          if (dist <= 3) {
            results.push({
              name: `${other.feature.properties.First_Name} ${other.feature.properties.Last_Name}`,
              distance: dist.toFixed(2)
            });
          }
        }
      });

      results.sort((a, b) => Number(a.distance) - Number(b.distance));
      const top5 = results.slice(0, 5);

      let html = '<div class="nearby-popup"><table><thead>' +
                 '<tr><th>Name</th><th>Distance (mi)</th></tr>' +
                 '</thead><tbody>';

      top5.forEach(r => {
        html += `<tr><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.distance)}</td></tr>`;
      });

      html += '</tbody></table></div>';

      infoWindow.setContent(html);
      infoWindow.setPosition({ lat: member.lat, lng: member.lng });
      infoWindow.open(map);
    }

function stripHtml(html) {
  const div = document.createElement("div");
  div.innerHTML = html || "";
  return div.textContent || div.innerText || "";
}

function formatMiles(mi) {
  if (!Number.isFinite(mi)) return "";
  if (mi < 0.1) return `${Math.round(mi * 5280)} ft`;
  return `${mi.toFixed(1)} mi`;
}

function getStepEnd(step) {
  const lat = step.end_location?.lat?.();
  const lng = step.end_location?.lng?.();
  if (typeof lat !== "number" || typeof lng !== "number") return null;
  return { lat, lng };
}

function getStepStart(step) {
  const lat = step.start_location?.lat?.();
  const lng = step.start_location?.lng?.();
  if (typeof lat !== "number" || typeof lng !== "number") return null;
  return { lat, lng };
}

function getRoadNameFromInstruction(instruction) {
  const text = stripHtml(instruction);

  const ontoMatch = text.match(/\bonto\s+(.+?)(?:\.|$)/i);
  if (ontoMatch) return ontoMatch[1].trim();

  const onMatch = text.match(/\bon\s+(.+?)(?:\.|$)/i);
  if (onMatch) return onMatch[1].trim();

  return "this road";
}
    
function getRoutePathPoints() {
  const route = activeRouteResult?.routes?.[0];
  const path = route?.overview_path || [];
  return path.map(getLatLngObj).filter(Boolean);
}

function distanceToRouteMiles(userLat, userLng) {
  const path = getRoutePathPoints();
  if (!path.length) return Infinity;

  let best = Infinity;

  path.forEach(p => {
    const d = haversine(userLat, userLng, p.lat, p.lng);
    if (d < best) best = d;
  });

  return best;
}
function findClosestRoutePoint(userLat, userLng, maxSnapMiles = 0.035) {
  if (!fullRoutePathForProgress || !fullRoutePathForProgress.length) return null;

  let closestPoint = null;
  let bestDist = Infinity;

  fullRoutePathForProgress.forEach(p => {
    const d = haversine(userLat, userLng, p.lat, p.lng);

    if (d < bestDist) {
      bestDist = d;
      closestPoint = p;
    }
  });

  if (!closestPoint || bestDist > maxSnapMiles) {
    return null;
  }

  return {
    lat: closestPoint.lat,
    lng: closestPoint.lng,
    distanceMiles: bestDist
  };
}

function maybeReroute(userLat, userLng, accuracyMeters = null, speedMetersPerSecond = null) {
  if (isRerouting || !activeDestination || !directionsService) return;

  if (accuracyMeters !== null && accuracyMeters > MAX_REROUTE_ACCURACY_METERS) {
    console.log("Skipping reroute check due to poor GPS accuracy:", accuracyMeters);
    return;
  }

  const speedMph =
    typeof speedMetersPerSecond === "number" && Number.isFinite(speedMetersPerSecond)
      ? speedMetersPerSecond * 2.23694
      : null;

  if (speedMph !== null && speedMph < MIN_REROUTE_SPEED_MPH) {
    offRouteCount = 0;
    console.log("Skipping reroute check because speed is low:", speedMph);
    return;
  }

  const now = Date.now();
  if (now - lastRerouteTime < REROUTE_COOLDOWN_MS) return;

  const leg = activeRouteResult?.routes?.[0]?.legs?.[0];
  if (!leg || !leg.steps || !leg.steps.length) return;

  let closestStepResult = null;

  leg.steps.forEach(step => {
    const result = stepRemainingDistanceFromUser(step, userLat, userLng);
    if (!result) return;

    if (!closestStepResult || result.distanceFromStep < closestStepResult.distanceFromStep) {
      closestStepResult = result;
    }
  });

  if (!closestStepResult) return;

  const distanceFromCurrentStep = closestStepResult.distanceFromStep;
  const distanceToNextTurn = closestStepResult.remaining;

  if (distanceToNextTurn <= NEAR_NEXT_TURN_NO_REROUTE_MILES) {
    offRouteCount = 0;
    console.log("Skipping reroute check near next turn:", distanceToNextTurn);
    return;
  }

  if (distanceFromCurrentStep > OFF_ROUTE_THRESHOLD_MILES) {
    offRouteCount += 1;
    console.log("Possible off-route:", offRouteCount, distanceFromCurrentStep);
  } else {
    offRouteCount = 0;
  }

  if (offRouteCount >= OFF_ROUTE_CONFIRMATION_COUNT) {
    offRouteCount = 0;
    rerouteFromCurrentLocation(userLat, userLng);
  }
}

function rerouteFromCurrentLocation(userLat, userLng) {
  if (!activeDestination || !directionsService) return;

  isRerouting = true;
  lastRerouteTime = Date.now();

  const routeSummary = document.getElementById("route-summary");
  routeSummary.innerHTML = `
    <div class="route-summary">
      <div><strong>Rerouting...</strong></div>
      <button onclick="stopNavigation()">Stop Navigation</button>
    </div>
  `;

  directionsService.route(
    {
      origin: { lat: userLat, lng: userLng },
      destination: activeDestination,
      travelMode: google.maps.TravelMode.DRIVING,
      provideRouteAlternatives: true
    },
    (result, status) => {
      isRerouting = false;

      if (status !== "OK") {
        console.error("REROUTE FAILED:", status);
        return;
      }

      activeRouteResult = result;
      directionsRenderer.setDirections(result);

      const path = getFullRoutePath();
      fullRoutePathForProgress = path;

      if (routePolylineFull) routePolylineFull.setMap(null);
      if (routePolylineTraveled) routePolylineTraveled.setMap(null);

      routePolylineFull = new google.maps.Polyline({
        path,
        strokeColor: "#1a73e8",
        strokeOpacity: 1,
        strokeWeight: 6,
        map
      });

      routePolylineTraveled = new google.maps.Polyline({
        path: [],
        strokeColor: "#888",
        strokeOpacity: 1,
        strokeWeight: 6,
        map
      });

      navFollowing = true;
      lastGoodHeading = null;

      navProgrammaticMapMove = true;
      map.setCenter({ lat: userLat, lng: userLng });

      if ((map.getZoom() || 0) < 16) {
        map.setZoom(16);
      }

      setTimeout(() => {
        navProgrammaticMapMove = false;
      }, 300);

      updateNavigationStep(userLat, userLng);
    }
  );
}

function updateTraveledRoute(userLat, userLng) {
  if (!routePolylineFull || !routePolylineTraveled || !fullRoutePathForProgress.length) return;

  let closestIndex = 0;
  let bestDist = Infinity;

  fullRoutePathForProgress.forEach((p, index) => {
    const d = haversine(userLat, userLng, p.lat, p.lng);
    if (d < bestDist) {
      bestDist = d;
      closestIndex = index;
    }
  });

  const traveledPath = fullRoutePathForProgress.slice(0, closestIndex + 1);
  const remainingPath = fullRoutePathForProgress.slice(closestIndex);

  routePolylineTraveled.setPath(traveledPath);
  routePolylineFull.setPath(remainingPath);
}

function updateSpeedBadge(speedMetersPerSecond, accuracyMeters = null) {
  const speedBadge = document.getElementById("speed-badge");
  const speedValue = document.getElementById("speed-value");

  if (!speedBadge || !speedValue) return;

  if (!navigationMode) {
    speedBadge.style.display = "none";
    return;
  }

  speedBadge.style.display = "flex";

  if (
    typeof speedMetersPerSecond !== "number" ||
    !Number.isFinite(speedMetersPerSecond) ||
    speedMetersPerSecond < 0 ||
    (accuracyMeters !== null && accuracyMeters > 80)
  ) {
    speedValue.textContent = Math.round(lastGoodSpeedMph);
    return;
  }

  let mph = speedMetersPerSecond * 2.23694;

  // Treat very small GPS drift as stopped.
  if (mph < 1) {
    mph = 0;
  }

  // Ignore insane GPS spikes for driving navigation.
  if (mph > 140) {
    speedValue.textContent = Math.round(lastGoodSpeedMph);
    return;
  }

  // Smooth the display so it does not jump wildly.
  lastGoodSpeedMph = (lastGoodSpeedMph * 0.7) + (mph * 0.3);

  speedValue.textContent = Math.round(lastGoodSpeedMph);
}

function calculateBearing(fromLat, fromLng, toLat, toLng) {
  const toRad = x => x * Math.PI / 180;
  const toDeg = x => x * 180 / Math.PI;

  const lat1 = toRad(fromLat);
  const lat2 = toRad(toLat);
  const dLng = toRad(toLng - fromLng);

  const y = Math.sin(dLng) * Math.cos(lat2);
  const x =
    Math.cos(lat1) * Math.sin(lat2) -
    Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);

  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function updateMapHeading(userLat, userLng, headingDegrees, speedMetersPerSecond = null) {
  if (!navigationMode || !navFollowing || !map) return;

  const speedMph =
    typeof speedMetersPerSecond === "number" && Number.isFinite(speedMetersPerSecond)
      ? speedMetersPerSecond * 2.23694
      : null;

  if (speedMph !== null && speedMph < MIN_HEADING_SPEED_MPH) return;

  let heading = null;

  if (
    typeof headingDegrees === "number" &&
    Number.isFinite(headingDegrees) &&
    headingDegrees >= 0
  ) {
    heading = headingDegrees;
  } else if (lastHeadingPoint) {
    const moved = haversine(lastHeadingPoint.lat, lastHeadingPoint.lng, userLat, userLng);

    if (moved > 0.005) {
      heading = calculateBearing(lastHeadingPoint.lat, lastHeadingPoint.lng, userLat, userLng);
    }
  }

  lastHeadingPoint = { lat: userLat, lng: userLng };

  if (heading === null) return;

  if (lastGoodHeading === null) {
    lastGoodHeading = heading;
  } else {
    let diff = heading - lastGoodHeading;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    lastGoodHeading = (lastGoodHeading + diff * 0.25 + 360) % 360;
  }

  map.moveCamera({
    heading: lastGoodHeading,
    tilt: 45
  });
}

function getLatLngObj(point) {
  if (!point) return null;

  const lat = typeof point.lat === "function" ? point.lat() : point.lat;
  const lng = typeof point.lng === "function" ? point.lng() : point.lng;

  if (typeof lat !== "number" || typeof lng !== "number") return null;
  return { lat, lng };
}

function stepRemainingDistanceFromUser(step, userLat, userLng) {
  const path = step.path || [];
  if (!path.length) return null;

  let closestIndex = 0;
  let closestDist = Infinity;

  path.forEach((point, index) => {
    const p = getLatLngObj(point);
    if (!p) return;

    const d = haversine(userLat, userLng, p.lat, p.lng);
    if (d < closestDist) {
      closestDist = d;
      closestIndex = index;
    }
  });

  let remaining = closestDist;

  for (let i = closestIndex; i < path.length - 1; i++) {
    const a = getLatLngObj(path[i]);
    const b = getLatLngObj(path[i + 1]);
    if (!a || !b) continue;

    remaining += haversine(a.lat, a.lng, b.lat, b.lng);
  }

  return {
    remaining,
    distanceFromStep: closestDist
  };
}


function cleanDirectionText(html) {
  let text = stripHtml(html || "")
    .replace(/\s+/g, " ")
    .replace(/\bDestination\b/gi, "destination")
    .trim();

  // Replace standalone directions (N, S, E, W)
  text = text.replace(/\bN\b/g, "North");
  text = text.replace(/\bS\b/g, "South");
  text = text.replace(/\bE\b/g, "East");
  text = text.replace(/\bW\b/g, "West");

  // Replace combinations like NE, NW, SE, SW
  text = text.replace(/\bNE\b/g, "Northeast");
  text = text.replace(/\bNW\b/g, "Northwest");
  text = text.replace(/\bSE\b/g, "Southeast");
  text = text.replace(/\bSW\b/g, "Southwest");

  // Replace state abbreviations
  text = text.replace(/\bUT\b/g, "Utah");

  return text;
}

async function speakDirection(text, force = false) {
  if (!navigationMode || !text) return;

  const spokenText = cleanDirectionText(text);
  showNavCaption(spokenText);
  if (!spokenText) return;

  if (!force && spokenText === lastSpokenDirection) return;

  lastSpokenDirection = spokenText;

  try {
    const response = await fetch(NAV_VOICE_WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: spokenText })
    });

    if (!response.ok) {
      console.error("Voice request failed:", await response.text());
      return;
    }

    const audioBlob = await response.blob();
    const audioUrl = URL.createObjectURL(audioBlob);

    if (!navVoiceAudio) {
      navVoiceAudio = new Audio();
      navVoiceAudio.volume = 1;
    }

    navVoiceAudio.pause();
    navVoiceAudio.src = audioUrl;
    navVoiceAudio.currentTime = 0;

    await navVoiceAudio.play();

    navVoiceAudio.onended = () => {
      URL.revokeObjectURL(audioUrl);
    };
  } catch (err) {
    console.error("Voice playback error:", err);
  }
}

function speakInitialStep() {
  const leg = activeRouteResult?.routes?.[0]?.legs?.[0];
  if (!leg || !leg.steps || !leg.steps.length) return;

  const firstStep = leg.steps[0];
  if (!firstStep) return;

  speakDirection(firstStep.instructions || "");
}
function updateNavigationStep(userLat, userLng) {
  const leg = activeRouteResult?.routes?.[0]?.legs?.[0];
  if (!leg || !leg.steps || !leg.steps.length) return;

  const steps = leg.steps;

  let activeIndex = 0;
  let bestDistanceFromStep = Infinity;
  let bestRemaining = null;

  steps.forEach((step, index) => {
    const result = stepRemainingDistanceFromUser(step, userLat, userLng);
    if (!result) return;

    if (result.distanceFromStep < bestDistanceFromStep) {
      bestDistanceFromStep = result.distanceFromStep;
      bestRemaining = result.remaining;
      activeIndex = index;
    }
  });

  const activeStep = steps[activeIndex];
  const nextStep = steps[activeIndex + 1];
  const nextTurnThresholdMiles = 0.2;

  let displayHtml = "";
if (nextStep && bestRemaining !== null && bestRemaining <= nextTurnThresholdMiles) {
  const distanceText = formatMiles(bestRemaining);
  const spokenInstruction = `In ${distanceText}, ${cleanDirectionText(nextStep.instructions || "")}`;
  const stepKey = `next-${activeIndex + 1}`;

  const nowTurnThresholdMiles = 0.05;
  const nowTurnKey = `now-${activeIndex + 1}`;
  const nowTurnText = cleanDirectionText(nextStep.instructions || "");

  if (bestRemaining <= nowTurnThresholdMiles && nowTurnKey !== lastSpokenNowTurnKey) {
    lastSpokenNowTurnKey = nowTurnKey;
    speakDirection(nowTurnText, true);
  } else if (stepKey !== lastSpokenStepKey) {
    lastSpokenStepKey = stepKey;
    speakDirection(spokenInstruction, true);
  }

  displayHtml = `
    <div><strong>Next step:</strong> ${nextStep.instructions || ""}</div>
    <div><strong>Step distance:</strong> ${escapeHtml(nextStep.distance?.text || "")}</div>
  `;
}
  
    else {
  const roadName = getRoadNameFromInstruction(activeStep.instructions);
  const remainingText = bestRemaining !== null
    ? formatMiles(bestRemaining)
    : escapeHtml(activeStep.distance?.text || "");
  showNavCaption(`Continue on ${roadName} for ${remainingText}`);

  const continueKey = `continue-${activeIndex}`;

  if (continueKey !== lastSpokenContinueKey && bestRemaining !== null) {
    lastSpokenContinueKey = continueKey;
    speakDirection(`Continue on ${roadName} for ${remainingText}`, true);
  }

  displayHtml = `
    <div><strong>Continue on:</strong> ${escapeHtml(roadName)}</div>
    <div><strong>For:</strong> ${escapeHtml(remainingText)}</div>
  `;
}

  const routeSummary = document.getElementById("route-summary");
  routeSummary.innerHTML = `
    <div class="route-summary">
      ${displayHtml}
      <button onclick="stopNavigation()">Stop Navigation</button>
      <button onclick="navFollowing = true">Follow Me</button>
    </div>
  `;
}
function locateUser(centerMap = true) {
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const accuracy = pos.coords.accuracy;

      await addCurrentLocationMarker(lat, lng, accuracy);

      if (centerMap) {
        map.setCenter({ lat, lng });

        if ((map.getZoom() || 0) < 15) {
          map.setZoom(15);
        }
      }
    },
    (err) => {
      console.error("LOCATE ERROR:", err);
      alert("Unable to retrieve your location.");
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
} 
    
function startPassiveLocationWatch(centerWhileWatching = true) {
  if (passiveLocationWatchId !== null) return;

  passiveLocationWatchId = navigator.geolocation.watchPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      await addCurrentLocationMarker(
        lat,
        lng,
        pos.coords.accuracy
      );

      if (centerWhileWatching && !navigationMode) {
        map.setCenter({ lat, lng });

        if ((map.getZoom() || 0) < 15) {
          map.setZoom(15);
        }
      }
    },
    (err) => {
      console.error("PASSIVE LOCATION WATCH ERROR:", err);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 1000
    }
  );
}

searchInput.addEventListener("keyup", e => {
  if (e.key === "Enter") {

    let found = false;

allMembers.forEach(member => {
  if (member.searchKey.includes(q)) {
    map.setCenter({ lat: member.lat, lng: member.lng });
    map.setZoom(16);

    if (member.isSpecial) {
      infoWindow.setContent(`
        <div>
          <strong>${member.feature.properties.Name || ""}</strong><br>
          ${member.feature.properties.Address || ""}<br>
          <em>${member.feature.properties.Location_type || ""}</em>
        </div>
      `);

    } else {
      openMemberPopup(member);
    }

    found = true;
  }
});

    if (!found) {
      alert("No matching member found.");
    }
  }
});

      searchInput.addEventListener("input", e => {
        const q = e.target.value.trim().toLowerCase();

        clearBtn.style.display = q ? "block" : "none";

        if (q.length >= 3) {
          datalist.innerHTML = "";

          const seen = new Set();
          const suggestions = [];

          allMembers.forEach(member => {
            const address = member.feature.properties.Address || "";
            const normalizedStoredAddress = normalizeAddress(address);
            const normalizedQ = normalizeAddress(q);

            let displayName = "";

            if (member.isSpecial) {
              displayName = member.feature.properties.Name || "";
            } else {
              const firstName = member.feature.properties.First_Name || "";
              const lastName = member.feature.properties.Last_Name || "";
              displayName = `${firstName} ${lastName}`.trim();
            }

            if (displayName.toLowerCase().startsWith(q) && !seen.has(displayName)) {
              seen.add(displayName);
              suggestions.push(displayName);
            }

            if (normalizedStoredAddress.startsWith(normalizedQ) && !seen.has(address)) {
              seen.add(address);
              suggestions.push(address);
            }
          });

          suggestions.slice(0, 10).forEach(value => {
            const option = document.createElement("option");
            option.value = value;
            datalist.appendChild(option);
          });
        } else {
          datalist.innerHTML = "";
        }
      });

addressInput.addEventListener("input", e => {
  const q = normalizeAddress(e.target.value);

  addressList.innerHTML = "";

  if (q.length >= 3) {
    const seen = new Set();
    const suggestions = [];

    allMembers.forEach(member => {
      const address = member.feature.properties.Address || "";
      const normalizedStoredAddress = normalizeAddress(address);

      if (normalizedStoredAddress.includes(q) && !seen.has(address)) {
        seen.add(address);
        suggestions.push(address);
      }
    });

    suggestions
      .sort((a, b) => a.localeCompare(b))
      .slice(0, 10)
      .forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        addressList.appendChild(option);
      });
  }

  applyAddressQuery(e.target.value);
});

      resetBtn.addEventListener("click", () => {
        addressInput.value = "";
        applyAddressQuery("");
      });

      toggleBtn.addEventListener("click", () => {
        if (!isMobileLike()) return;

        if (document.body.classList.contains("mobile-address-mode")) {
          setQueryMode("name");
        } else {
          setQueryMode("address");
        }
      });

      clearBtn.addEventListener("click", () => {

navRecenterBtn.addEventListener("click", () => {

      map.setZoom(16);
    }
  }
});

      routePanelClose.addEventListener("click", clearRoute);

          lastWindowWidth = window.innerWidth;
          setQueryMode(document.body.classList.contains("mobile-address-mode") ? "address" : "name");
          updateTopPanelHeight();

      window.addEventListener("orientationchange", () => {
        setTimeout(() => {
          setQueryMode(document.body.classList.contains("mobile-address-mode") ? "address" : "name");

locateBtn.addEventListener("click", () => {
